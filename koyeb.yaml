name: hermes-telegram-agent
service:
  type: web
  runtime: docker
  dockerfile: Dockerfile
  ports:
    - port: 8080
      protocol: http
  env:
    - key: PORT
      value: "8080"
    - key: LISTEN_HOST
      value: "0.0.0.0"
  routes:
    - path: /
      port: 8080
  regions:
    - par
  instance_type: nano
  scaling:
    min: 1
    max: 1
